<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norton University - Medical Refill Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap');
        body { font-family: 'ui-sans-serif', system-ui, sans-serif; background-color: #f1f5f9; }
        
        .input-blank {
            border-bottom: 2px solid #3b82f6;
            background: #eff6ff;
            outline: none;
            padding: 0 10px;
            font-weight: bold;
            color: #1e40af;
            min-width: 140px;
            display: inline-block;
            transition: all 0.3s ease;
            text-align: center;
        }
        .correct { border-bottom-color: #10b981 !important; background-color: #dcfce7 !important; color: #065f46 !important; }
        .incorrect { border-bottom-color: #ef4444 !important; background-color: #fee2e2 !important; color: #991b1b !important; }
        .ans-reveal { font-size: 0.8rem; color: #059669; font-weight: bold; display: block; margin-top: 2px; height: 1.2rem; }
        
        .redo-btn {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            background-color: #fff;
            color: #3b82f6;
            border: 1px solid #d1d5db;
            cursor: pointer;
            transition: all 0.2s;
        }
        .redo-btn:hover { background-color: #3b82f6; color: white; }
        
        .section-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }
        .khmer-header { font-family: 'Kantumruy Pro', sans-serif; }
    </style>
</head>

        let audioCtx = null;
        function playTone(f, dur) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(f, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function renderExam() {
            const container = document.getElementById('exam-container');
            let totalB = 0;
            examData.forEach(section => {
                let html = `
                <div class="section-card" id="sec-${section.id}">
                    <div class="bg-slate-100 px-6 py-4 border-b flex justify-between items-center rounded-t-3xl">
                        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight">Question Group ${section.id}: ${section.title}</h2>
                        <button onclick="resetSection(${section.id})" class="redo-btn">⟲ Reset Section</button>
                    </div>
                    <div class="p-6 space-y-8">`;
                
                section.questions.forEach(q => {
                    const parts = q.text.split(/{|}/);
                    let qHtml = `<div class="text-gray-800 leading-relaxed font-medium">
                        <span class="text-blue-600 font-bold mr-2">Question ${q.id}:</span>`;
                    
                    let blankIdx = 0;
                    parts.forEach((part, idx) => {
                        // Check if this part is a placeholder
                        const isPlaceholder = q.ans.some(a => part.toLowerCase() === a.toLowerCase());

                        if (isPlaceholder) {
                            const expected = q.ans[blankIdx++];
                            totalB++;
                            qHtml += `<span class="relative inline-block mx-1">
                                <input type="text" data-ans="${expected}" onblur="checkLine(this)" class="input-blank" placeholder="......">
                                <span class="ans-reveal hidden"></span>
                            </span>`;
                        } else {
                            qHtml += `<span>${part}</span>`;
                        }
                    });
                    qHtml += `</div>`;
                    html += qHtml;
                });
                
                html += `</div></div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
            document.getElementById('total-blanks').textContent = totalB;
        }

        function checkLine(input) {
            if (input.value.trim() === "") return;
            const correct = input.dataset.ans.toLowerCase().replace(/\s/g, '');
            const user = input.value.trim().toLowerCase().replace(/\s/g, '');
            const reveal = input.parentElement.querySelector('.ans-reveal');

            if (user === correct) {
                input.classList.add('correct');
                input.classList.remove('incorrect');
                reveal.classList.add('hidden');
                playTone(880, 0.1);
            } else {
                input.classList.add('incorrect');
                input.classList.remove('correct');
                reveal.textContent = `(${input.dataset.ans})`;
                reveal.classList.remove('hidden');
                playTone(220, 0.2);
            }
        }

        function resetSection(sid) {
            const section = document.getElementById(`sec-${sid}`);
            const inputs = section.querySelectorAll('input');
            const reveals = section.querySelectorAll('.ans-reveal');
            inputs.forEach(i => { i.value = ""; i.classList.remove('correct', 'incorrect'); });
            reveals.forEach(r => r.classList.add('hidden'));
        }

        function calculateFinal() {
            let score = 0;
            const inputs = document.querySelectorAll('.input-blank');
            inputs.forEach(i => {
                const correct = i.dataset.ans.toLowerCase().replace(/\s/g, '');
                const user = i.value.trim().toLowerCase().replace(/\s/g, '');
                if (user === correct) score++;
                checkLine(i);
            });
            document.getElementById('final-score').textContent = score;
            document.getElementById('result-box').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.onload = renderExam;
    </script>
</body>
</html>
