<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parasitology Quiz - Dr. PEN Sunna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap');
        body { font-family: 'ui-sans-serif', system-ui, sans-serif; background-color: #f8fafc; }
        
        .option-correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            animation: pulse-green 0.4s ease-out;
        }
        .option-incorrect {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            animation: shake 0.4s ease-in-out;
        }
        @keyframes pulse-green {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .disabled-labels { pointer-events: none; opacity: 0.8; }
        .redo-btn {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            background-color: #fff;
            color: #6366f1;
            border: 1px solid #d1d5db;
            cursor: pointer;
            transition: all 0.2s;
        }
        .redo-btn:hover { background-color: #6366f1; color: white; }
        .q-block { border-left: 8px solid #6366f1; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden border border-gray-200">
        <!-- Header -->
        <div class="bg-indigo-900 p-10 text-white text-center">
            <h1 class="text-3xl font-black mb-2 uppercase tracking-tight">Multiple Choice Questions for Parasitology</h1>
            <p class="text-xl opacity-80">(by Dr. PEN Sunna)</p>
        </div>

        <div class="p-6 md:p-10">
            <!-- Redo Section Button -->
            <div class="flex justify-end mb-6">
                <button onclick="resetSection()" class="redo-btn flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    Redo All Questions
                </button>
            </div>

            <div id="quiz-container" class="space-y-8">
                <!-- Questions generated by JS -->
            </div>

            <!-- Scoring -->
            <div id="result-box" class="hidden mt-16 p-10 bg-slate-900 text-white rounded-3xl text-center shadow-2xl">
                <h2 class="text-3xl font-bold mb-4">Final Score</h2>
                <div class="text-7xl font-black text-indigo-400 mb-4"><span id="score-display">0</span> / 30</div>
                <button onclick="location.reload()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-10 rounded-full transition">Restart Quiz</button>
            </div>

            <div class="mt-12 flex justify-center pb-10">
                <button onclick="calculateFinal()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 px-16 rounded-full shadow-2xl transform transition active:scale-95 text-xl uppercase tracking-widest">
                    Submit & Grade
                </button>
            </div>
        </div>
    </div>

    <script>
        // Data containing original text and correct answers
        const quizData = [
            { n: 1, q: "What is the common name of *Loa loa*?", o: ["River blindness worm", "Eye worm", "Guinea worm", "Onchocerca worm"], a: "B" },
            { n: 2, q: "What kind of nematode worm that cause only in subcutaneous filariasis in humans?", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "A" },
            { n: 3, q: "What is the name of worm that its young larvae developed in the horseflies?", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "A" },
            { n: 4, q: "Adult worm that produced microfilariae measuring 250 to 300 μm by 6 to 8 μm is:", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "A" },
            { n: 5, q: "What kind of nematode that caused Calabar swellings?", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "A" },
            { n: 6, q: "What kind of nematode that caused swelling of the eye?", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "A" },
            { n: 7, q: "What is the common medicine to treat loiasis?", o: ["Ivermectin", "Metronidazole", "Doxycycline", "Albendazole"], a: "A" },
            { n: 8, q: "What kind of worm that caused River blindness?", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "B" },
            { n: 9, q: "What is the definitive host for *Onchocerca volvulus*?", o: ["Black fly", "Horsefly", "Human", "Copepod"], a: "C" },
            { n: 10, q: "Adult males range in length from 19-42 cm and range in width from 130-210 micrometers is:", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "B" },
            { n: 11, q: "Adult worms can live in the nodules for approximately 15 years is:", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "B" },
            { n: 12, q: "What kind of nematode that caused Lizard skin disease?", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "B" },
            { n: 13, q: "What kind of worm that caused Swollen lymph nodes or/and blindness?", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "B" },
            { n: 14, q: "What medicines that can treat onchocerciasis?", o: ["Ivermectin + Doxycycline", "Metronidazole", "Doxycycline + Albendazole", "Albendazole"], a: "A" },
            { n: 15, q: "What kind of nematode worm that caused elephantiasis?", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "C" },
            { n: 16, q: "What kind of worm that adult male and female are most often coiled together and are difficult to separate?", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "C" },
            { n: 17, q: "The vector of *Wuchereria bancrofti* filariasis are:", o: ["*Culex*; *Anopheles*; *Aedes*; *Mansonia*", "*Culex*; *Anopheles*; horsefly; *Mansonia*", "Black fly; *Anopheles*; *Aedes*; *Mansonia*", "Horse fly; *Culex*; *Anopheles*; black fly"], a: "A" },
            { n: 18, q: "Adult worms produce microfilariae measuring 244 to 296 μm by 7.5 to 10 μm is:", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "C" },
            { n: 19, q: "The location of Elephantiasis affects to men mainly in:", o: ["Legs, arms, and scrotum", "Legs, arms and breasts", "Breasts, face and legs", "Legs, arms and eyes"], a: "A" },
            { n: 20, q: "Method of diagnosis of microfilariae of *Wuchereria bancrofti* can be implemented by:", o: ["A blood smear, a polymerase chain reaction test, Ultrasonography", "Ultrasonography", "A blood smear and stool", "A blood smear, stool, a polymerase chain reaction test and Ultrasonography"], a: "A" },
            { n: 21, q: "The therapeutic drugs for *Wuchereria bancrofti* microfilariae are:", o: ["Diethylcarbamazine (DEC), ivermectin, or albendazole", "Diethylcarbamazine (DEC), doxycycline, or albendazole", "Diethylcarbamazine (DEC), erythromycin, or albendazole", "Diethylcarbamazine (DEC), erythromycin, or metronidazole"], a: "A" },
            { n: 22, q: "What kind of worm that caused Guinea worm disease?", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "D" },
            { n: 23, q: "Adult female worms can reach a maximum length of up to 800 mm long is:", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "D" },
            { n: 24, q: "What kind of Adult female worms that formed a blister in the skin?", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "D" },
            { n: 25, q: "The vector of *Dracunculus medinensis* is:", o: ["Copepods", "*Anopheles*", "Black fly", "Horse fly"], a: "A" },
            { n: 26, q: "The methods of diagnosis on seeing the worms emerging from the lesions and microscopic examinations of the larvae is used for diagnosis:", o: ["*Loa Loa*", "*Onchocerca volvulus*", "*Wuchereria bancrofti*", "*Dracunculus medinensis*"], a: "D" },
            { n: 27, q: "What is the common name of disease that caused by *Dracunculus medinensis*?", o: ["River blindness disease", "Eye worm disease", "Guinea worm disease", "Onchocerciasis"], a: "C" },
            { n: 28, q: "*Dracunculus medinensis* larvae are found in:", o: ["Freshwater", "Salt water", "Freshwater and salt water", "Pollution water"], a: "A" },
            { n: 29, q: "Why only *Dracunculus medinensis* female worms induce a blister on the skin?", o: ["Male could not compete with female", "Male smaller than female", "Male could not produce larvae", "After copulation, the male worms die and the females migrate in the skin surface"], a: "D" },
            { n: 30, q: "The eradication program of World Health Organization (WHO) and the Disease Control and Prevention (CDC) eliminated *Dracunculus medinensis* worms 99.99% in year:", o: ["1984", "1995", "2014", "2015"], a: "D" }
        ];

        let audioCtx = null;
        function playTone(freq, type, duration) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            quizData.forEach((item, idx) => {
                const questionHtml = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 q-block" id="q-block-${idx}" data-correct="${item.a}">
                        <p class="font-bold text-lg text-slate-800 mb-4">${item.n}. ${item.q.replace(/\*(.*?)\*/g, '<em class="text-indigo-600">$1</em>')}</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 options-grid">
                            ${item.o.map((opt, oIdx) => {
                                const letter = String.fromCharCode(65 + oIdx);
                                return `
                                    <label class="flex items-center p-4 border-2 border-gray-100 rounded-xl cursor-pointer hover:bg-indigo-50 transition-all">
                                        <input type="radio" name="q${idx}" value="${letter}" class="hidden" onchange="handleAnswer(this)">
                                        <span class="font-bold text-indigo-500 mr-3">${letter}.</span>
                                        <span class="text-slate-700">${opt.replace(/\*(.*?)\*/g, '<em>$1</em>')}</span>
                                    </label>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', questionHtml);
            });
        }

        function handleAnswer(input) {
            const block = input.closest('.q-block');
            const grid = block.querySelector('.options-grid');
            const labels = grid.querySelectorAll('label');
            const selected = input.value;
            const correct = block.dataset.correct;

            grid.classList.add('disabled-labels');

            labels.forEach(label => {
                const val = label.querySelector('input').value;
                if (val === correct) label.classList.add('option-correct');
                if (val === selected && selected !== correct) label.classList.add('option-incorrect');
            });

            if (selected === correct) playTone(880, 'sine', 0.2);
            else playTone(220, 'square', 0.2);
        }

        function resetSection() {
            document.querySelectorAll('.q-block').forEach(block => {
                const grid = block.querySelector('.options-grid');
                grid.classList.remove('disabled-labels');
                grid.querySelectorAll('label').forEach(l => {
                    l.classList.remove('option-correct', 'option-incorrect');
                    l.querySelector('input').checked = false;
                });
            });
        }

        function calculateFinal() {
            let score = 0;
            document.querySelectorAll('.q-block').forEach(block => {
                const checked = block.querySelector('input:checked');
                if (checked && checked.value === block.dataset.correct) score++;
            });
            document.getElementById('score-display').textContent = score;
            document.getElementById('result-box').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.onload = renderQuiz;
    </script>
</body>
</html>
