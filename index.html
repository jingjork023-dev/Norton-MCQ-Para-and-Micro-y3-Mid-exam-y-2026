        let audioCtx = null;
        function playTone(freq, type, duration) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const playCorrect = () => playTone(880, 'sine', 0.2);
        const playWrong = () => playTone(220, 'square', 0.2);

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            let qCount = 0;
            quizData.forEach(section => {
                let html = `
                <div id="sec-${section.id}" class="space-y-8">
                    <div class="flex justify-between items-center border-b-4 border-slate-200 pb-3">
                        <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">${section.title}</h2>
                        <button onclick="resetSection(${section.id})" class="redo-btn">⟲ Reset Section</button>
                    </div>
                    <div class="grid grid-cols-1 gap-6">`;

                section.questions.forEach((q, idx) => {
                    qCount++;
                    html += `
                        <div class="bg-white p-6 border-l-8 border-slate-400 rounded-2xl shadow-md q-block" data-section="${section.id}" data-correct="${q.a}">
                            <p class="font-bold text-lg mb-4 text-gray-800">Question ${q.n}: ${q.q}</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 options-grid">
                                ${q.o.map((opt, oIdx) => {
                                    const letter = String.fromCharCode(65 + oIdx);
                                    return `
                                        <label class="flex items-center p-4 border-2 border-gray-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-all relative">
                                            <input type="radio" name="sec${section.id}-q${idx}" value="${oIdx}" class="hidden" onchange="checkAnswer(this)">
                                            <span class="font-bold text-slate-500 mr-2">${letter})-</span>
                                            <span class="text-gray-700 font-medium">${opt}</span>
                                        </label>
                                    `;
                                }).join('')}
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function checkAnswer(input) {
            const block = input.closest('.q-block');
            const grid = block.querySelector('.options-grid');
            const labels = grid.querySelectorAll('label');
            const selected = parseInt(input.value);
            const correct = parseInt(block.dataset.correct);

            grid.classList.add('disabled-labels');

            labels.forEach((label, i) => {
                if (i === correct) label.classList.add('option-correct');
                if (i === selected && selected !== correct) label.classList.add('option-incorrect');
            });

            if (selected === correct) playCorrect();
            else playWrong();
        }

        function resetSection(sectionId) {
            const blocks = document.querySelectorAll(`.q-block[data-section="${sectionId}"]`);
            blocks.forEach(block => {
                const grid = block.querySelector('.options-grid');
                grid.classList.remove('disabled-labels');
                const labels = grid.querySelectorAll('label');
                labels.forEach(l => {
                    l.classList.remove('option-correct', 'option-incorrect');
                    l.querySelector('input').checked = false;
                });
            });
        }

        function calculateFinalScore() {
            let score = 0;
            document.querySelectorAll('.q-block').forEach(block => {
                const checked = block.querySelector('input:checked');
                if (checked && parseInt(checked.value) === parseInt(block.dataset.correct)) score++;
            });
            document.getElementById('total-score').textContent = score;
            document.getElementById('final-result').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.onload = renderQuiz;
    </script>
</body>
</html>
